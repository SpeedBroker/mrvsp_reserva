<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedBroker - Painel do Gerente</title>
    <style>
        :root {
            --verde-principal: #004d24;
            --verde-escuro: #003318;
            --amarelo: #febd11;
            --cinza-fundo: #f4f7f5;
            --branco: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--cinza-fundo);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--verde-principal);
            color: var(--branco);
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--amarelo);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.9rem;
            color: #a3cfa2;
            margin-top: 5px;
        }

        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card-resumo {
            background-color: var(--branco);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-left: 5px solid var(--verde-principal);
        }

        .card-info h2 {
            font-size: 1.4rem;
            color: var(--verde-principal);
        }

        .card-info span {
            font-size: 0.9rem;
            color: #666;
        }

        .badge-total {
            background-color: var(--amarelo);
            color: var(--verde-escuro);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tabela-container {
            background-color: var(--branco);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: var(--verde-principal);
            color: var(--branco);
        }

        th, td {
            padding: 15px 20px;
            font-size: 0.95rem;
        }

        tr {
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background-color: #f9fbf9;
        }

        .status-ativo {
            color: #2e7d32;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-ativo::before {
            content: "";
            width: 8px;
            height: 8px;
            background-color: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }

        .sem-dados {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }

        /* Tela de Carregamento Inicial */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--branco);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--verde-principal);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p style="color: var(--verde-principal); font-weight: bold;">Carregando dados da equipe...</p>
    </div>

    <header>
        <h1>SpeedBroker</h1>
        <p>Painel de Monitoramento Regional de Acessos</p>
    </header>

    <main>
        <div class="card-resumo">
            <div class="card-info">
                <h2 id="nome-gerente">Gerente: Carregando...</h2>
                <span id="codigo-reg">Código Ref: ---</span>
            </div>
            <div class="badge-total" id="contador-corretores">0 Corretores</div>
        </div>

        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Corretor / Usuário</th>
                        <th>Último Acesso</th>
                        <th style="text-align: center;">Quantidade de Cliques</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    <tr>
                        <td colspan="4" class="sem-dados">Buscando registros na planilha master...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // URL da sua API do Google Apps Script (A mesma usada no desktop.js)
        const URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbwXlu0K9kGfFa0yxhhsUoX5MKz3clEOUPUSpuh_2zcS5eqtWzMLIrQezwumD2sd9m4/exec";

        function obterParametroUrl(nome) {
            var regex = new RegExp('[\\?&]' + nome + '=([^&#]*)');
            var resultados = regex.exec(location.search);
            return resultados === null ? '' : decodeURIComponent(resultados[1].replace(/\+/g, ' '));
        }

        const codigoRef = obterParametroUrl('ref').trim().toLowerCase();

        async function carregarDadosPainel() {
            if (!codigoRef) {
                document.getElementById('loading').innerHTML = `<p style="color: #d93025; font-weight: bold; padding: 20px; text-align: center;">Erro: Link inválido. Código de referência ausente.</p>`;
                return;
            }

            try {
                // Faz a requisição para o Google Apps Script pedindo os dados do Gerente
                // Passamos o userID como 'requisicao_painel' para o seu Código.gs saber separar se preferir,
                // mas a própria API já valida se ele existe.
                const resposta = await fetch(`${URL_API_GOOGLE}?ref=${codigoRef}&userID=requisicao_painel&_cb=${new Date().getTime()}`);
                const dados = await resposta.json();

                if (dados.status === "recusado") {
                    document.getElementById('loading').innerHTML = `<p style="color: #d93025; font-weight: bold; padding: 20px; text-align: center;">Acesso Negado: Código de gerente inválido.</p>`;
                    return;
                }

                // Atualiza o topo do Painel com o nome real retornado pela planilha
                document.getElementById('nome-gerente').innerText = `Gerente: ${dados.gerente || "Não Identificado"}`;
                document.getElementById('codigo-reg').innerText = `Código Ref: ${codigoRef.toUpperCase()}`;

                // Agora vamos buscar TODOS os registros da planilha para filtrar quem pertence a este gerente.
                // Para simplificar e rodar direto no mesmo link sem mexer no Código.gs atual:
                // Vamos simular a captura ou se você quiser, podemos fazer o Apps Script devolver a lista completa.
                
                // NOTA: Para este painel listar os corretores em tempo real, precisamos que o seu Código.gs 
                // saiba devolver a lista de linhas correspondentes a este ref. Vamos puxar os dados.
                
                // Como o seu Código.gs atual foi feito focado em salvar o clique e responder "autorizado", 
                // vamos fazer uma pequena adaptação nele se necessário. Mas primeiro, vamos testar o recebimento básico:
                
                // Exemplo de renderização caso queira popular estaticamente para teste ou via retorno de API:
                renderizarTabelaFicticia();

                // Esconde a tela de carregamento
                const loader = document.getElementById('loading');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 300);

            } catch (erro) {
                console.error("Erro ao carregar dados do gerente:", erro);
                document.getElementById('loading').innerHTML = `<p style="color: #d93025; font-weight: bold; padding: 20px; text-align: center;">Erro de comunicação com a planilha master.</p>`;
            }
        }

        // Função temporária de amostragem (Amanhã podemos puxar a array real do Log se você quiser atualizar o .gs)
        function renderizarTabelaFicticia() {
            const corpo = document.getElementById('tabela-corpo');
            
            // Aqui simulamos o que está gravado na sua planilha a partir da linha 16!
            // Quando integrarmos a leitura completa, esses dados virão direto do fetch.
            const dadosEquipe = [
                { nome: "Baldo", ultimoAcesso: new Date().toLocaleDateString('pt-BR') + " 16:13", cliques: 3 },
                { nome: "Fernando", ultimoAcesso: new Date().toLocaleDateString('pt-BR') + " 15:13", cliques: 3 },
                { nome: "Deise", ultimoAcesso: new Date().toLocaleDateString('pt-BR') + " 16:54", cliques: 2 },
                { nome: "Jose", ultimoAcesso: new Date().toLocaleDateString('pt-BR') + " 16:58", cliques: 1 }
            ];

            corpo.innerHTML = "";
            document.getElementById('contador-corretores').innerText = `${dadosEquipe.length} Corretores Ativos`;

            dadosEquipe.forEach(corretor => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 600; color: #111;">${corretor.nome}</td>
                    <td style="color: #666;">${corretor.ultimoAcesso}</td>
                    <td style="text-align: center; font-weight: bold; color: var(--verde-principal);">${corretor.cliques}</td>
                    <td><span class="status-ativo">Conectado</span></td>
                `;
                corpo.appendChild(tr);
            });
        }

        // Inicia a execução do painel
        window.onload = carregarDadosPainel;
    </script>
</body>
</html>
